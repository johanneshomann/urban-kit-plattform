services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:?NEXT_PUBLIC_HOCUSPOCUS_URL is required}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
    ports:
      - "127.0.0.1:3020:3000"
    environment:
      - DATABASE_URI=mongodb://mongo:27017/urban_kit
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:?PAYLOAD_SECRET is required}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-1025}
    volumes:
      - media_data:/app/media
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - urban_kit
    deploy:
      resources:
        limits:
          memory: 1g

  hocuspocus:
    build:
      context: ./hocuspocus
      dockerfile: Dockerfile
    environment:
      - PORT=1234
      - PAYLOAD_INTERNAL_URL=http://web:3000
      - HOCUSPOCUS_SECRET=${HOCUSPOCUS_SECRET:?HOCUSPOCUS_SECRET is required}
    ports:
      - "127.0.0.1:1234:1234"
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - urban_kit
    deploy:
      resources:
        limits:
          memory: 512m

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27019:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - urban_kit
    deploy:
      resources:
        limits:
          memory: 512m


networks:
  urban_kit:
    driver: bridge

volumes:
  mongo_data:
  media_data:
